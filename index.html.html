<title>텍스뷰</title>
<style>
  :root{
    --accent:#5aa98c; --accent-2:#4a3a2a;
    --surface:#f3ead4; --ink:#453a28; --edge:rgba(0,0,0,.10);
    --chrome:#1c2027; --chrome-2:#272c36; --chrome-line:#333a45;
    --chrome-ink:#eef1f6; --chrome-mute:#98a2b1;
    --fs:20px; --lh:1.75; --pad:24px; --maxw:44rem;
    --read:"Noto Serif KR","Apple SD Gothic Neo",serif;
    --ui:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;
    --sat:env(safe-area-inset-top); --sab:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0;overscroll-behavior:none}
  body{font-family:var(--ui);background:var(--surface);color:var(--ink);
    -webkit-font-smoothing:antialiased;transition:background .25s,color .25s}

  #reader{
    position:fixed;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:calc(var(--sat) + 64px) var(--pad) calc(var(--sab) + 80px);
  }
  #doc{max-width:var(--maxw);margin:0 auto;
    font-family:var(--read);font-size:var(--fs);line-height:var(--lh);
    color:var(--ink);word-break:keep-all;overflow-wrap:break-word;text-align:justify}
  #doc p{margin:0 0 .9em}
  #doc p.blank{height:.5em;margin:0}

  .bar{position:fixed;left:0;right:0;z-index:20;background:rgba(28,32,39,.92);
    -webkit-backdrop-filter:saturate(1.4) blur(14px);backdrop-filter:saturate(1.4) blur(14px);
    color:var(--chrome-ink);transition:transform .28s cubic-bezier(.2,.8,.2,1),opacity .2s}
  .top{top:0;padding:calc(var(--sat) + 8px) 10px 8px;display:flex;align-items:center;gap:6px;
    border-bottom:1px solid var(--chrome-line)}
  .bottom{bottom:0;padding:8px 14px calc(var(--sab) + 10px);border-top:1px solid var(--chrome-line);
    display:flex;align-items:center;gap:12px}
  body.immersive .bar{transform:translateY(var(--hide,0));opacity:0;pointer-events:none}
  body.immersive .top{--hide:-100%}
  body.immersive .bottom{--hide:100%}

  .brand{display:flex;align-items:center;gap:7px;font-weight:800;font-size:16px;letter-spacing:.01em;padding-left:6px}
  .brand .m{width:18px;height:22px;border-radius:3px 5px 5px 3px;flex:none;
    background:linear-gradient(180deg,#f6b0a0,#e0705a);box-shadow:inset -3px 0 0 rgba(0,0,0,.18)}
  .brand small{color:var(--chrome-mute);font-weight:600;font-size:11px}
  .grow{flex:1}
  .tb{appearance:none;border:0;background:transparent;color:var(--chrome-ink);
    height:40px;min-width:44px;padding:0 10px;border-radius:11px;font:inherit;font-size:14px;font-weight:600;
    display:inline-flex;align-items:center;justify-content:center;gap:6px}
  .tb:active{background:var(--chrome-2)}
  .tb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

  .pos{font-variant-numeric:tabular-nums;font-size:13px;color:var(--chrome-mute);min-width:44px;text-align:right}
  input[type=range]{flex:1;height:34px;accent-color:var(--accent);background:transparent}

<body>

  <div id="reader"><div id="doc"></div></div>

  <input type="file" id="file" accept=".txt,.md,.text,.log,.epub,application/epub+zip,text/plain" style="display:none">

<script>
"use strict";
const $=id=>document.getElementById(id);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const esc=s=>s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

const LS={
  get(k,d){ try{const v=localStorage.getItem(k);return v==null?d:JSON.parse(v);}catch(e){return d;} },
  set(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} }
};

const THEMES={
  paper:{n:'종이',bg:'#f3ead4',ink:'#453a28'},
  white:{n:'백지',bg:'#fbfbf9',ink:'#1b1b1a'},
  gray:{n:'회색',bg:'#c4c7cb',ink:'#17181a'},
  green:{n:'연녹',bg:'#cfe3d2',ink:'#22301f'},
  night:{n:'야간',bg:'#15181d',ink:'#c2c9d3'}
};

const S={
  text:'', name:'',
  settings:Object.assign({theme:'paper',font:'"Noto Serif KR","Apple SD Gothic Neo",serif',fs:20,lh:1.75,pad:24}, LS.get('tv:settings',{})),
  recents:LS.get('tv:recents',[])
};

const reader=$('reader'), doc=$('doc');

function decodeBytes(b){
  if(b.length>=3&&b[0]==0xEF&&b[1]==0xBB&&b[2]==0xBF) return new TextDecoder('utf-8').decode(b.subarray(3));
  if(b.length>=2&&b[0]==0xFF&&b[1]==0xFE) return new TextDecoder('utf-16le').decode(b.subarray(2));
  if(b.length>=2&&b[0]==0xFE&&b[1]==0xFF) return new TextDecoder('utf-16be').decode(b.subarray(2));
  try{ return new TextDecoder('utf-8',{fatal:true}).decode(b); }
  catch(e){ try{ return new TextDecoder('euc-kr').decode(b); }catch(_){ return new TextDecoder('utf-8').decode(b); } }
}

async function inflateRaw(bytes){
  if(typeof DecompressionStream==='undefined') throw new Error('no-ds');
  const ds=new DecompressionStream('deflate-raw');
  const stream=new Blob([bytes]).stream().pipeThrough(ds);
  return new Uint8Array(await new Response(stream).arrayBuffer());
}
function readZip(buf){
  const dv=new DataView(buf), u8=new Uint8Array(buf), n=buf.byteLength;
  let p=-1;
  for(let i=n-22;i>=Math.max(0,n-22-65557);i--){ if(dv.getUint32(i,true)===0x06054b50){p=i;break;} }
  if(p<0) throw new Error('ZIP 형식이 아님');
  const count=dv.getUint16(p+10,true), cdOff=dv.getUint32(p+16,true);
  const map=new Map(), lower=new Map();
  let o=cdOff;
  for(let i=0;i<count;i++){
    if(dv.getUint32(o,true)!==0x02014b50) break;
    const method=dv.getUint16(o+10,true);
    const compSize=dv.getUint32(o+20,true);
    const fnLen=dv.getUint16(o+28,true), exLen=dv.getUint16(o+30,true), cmLen=dv.getUint16(o+32,true);
    const localOff=dv.getUint32(o+42,true);
    const name=new TextDecoder('utf-8').decode(u8.subarray(o+46,o+46+fnLen));
    const rec={method,compSize,localOff};
    map.set(name,rec); lower.set(name.toLowerCase(),rec);
    o+=46+fnLen+exLen+cmLen;
  }
  return {dv,u8,map,lower};
}
async function zipData(zip,rec){
  if(!rec) return null;
  const dv=zip.dv, u8=zip.u8, lo=rec.localOff;
  if(dv.getUint32(lo,true)!==0x04034b50) return null;
  const fnLen=dv.getUint16(lo+26,true), exLen=dv.getUint16(lo+28,true);
  const start=lo+30+fnLen+exLen, comp=u8.subarray(start,start+rec.compSize);
  if(rec.method===0) return new Uint8Array(comp);
  if(rec.method===8) return await inflateRaw(comp);
  throw new Error('압축 방식 미지원');
}
function zipGet(zip,name){ const k=name.replace(/^\//,''); return zip.map.get(k)||zip.lower.get(k.toLowerCase())||null; }

const attr=(tag,name)=>{
  let m=tag.match(new RegExp(name+'\\s*=\\s*"([^"]*)"','i')); if(m) return m[1];
  m=tag.match(new RegExp(name+"\\s*=\\s*'([^']*)'",'i')); return m?m[1]:null;
};
const isDoc=n=>/\.(xhtml|html|htm)$/i.test(n);
const dirOf=p=>{p=p.replace(/\\/g,'/');const i=p.lastIndexOf('/');return i<0?'':p.slice(0,i+1);};
const stripFrag=h=>{const i=h.indexOf('#');return i<0?h:h.slice(0,i);};
function resolvePath(base,href){
  href=href.replace(/\\/g,'/'); if(href.startsWith('/')) return href.replace(/^\//,'');
  const parts=[];
  for(const seg of (base+href).split('/')){
    if(seg===''||seg==='.') continue;
    if(seg==='..') parts.pop(); else parts.push(seg);
  }
  return parts.join('/');
}
function decodeEntities(s){
  if(s.indexOf('&')<0) return s;
  s=s.replace(/&#x([0-9a-f]+);/gi,(_,h)=>{try{return String.fromCodePoint(parseInt(h,16));}catch(e){return '';}});
  s=s.replace(/&#(\d+);/g,(_,d)=>{try{return String.fromCodePoint(parseInt(d,10));}catch(e){return '';}});
  const map={nbsp:' ',ensp:' ',emsp:' ',lt:'<',gt:'>',quot:'"',apos:"'",mdash:'—',ndash:'–',hellip:'…',ldquo:'\u201C',rdquo:'\u201D',lsquo:'\u2018',rsquo:'\u2019',middot:'·'};
  s=s.replace(/&(nbsp|ensp|emsp|lt|gt|quot|apos|mdash|ndash|hellip|ldquo|rdquo|lsquo|rsquo|middot);/g,(_,e)=>map[e]);
  return s.replace(/&amp;/g,'&');
}
function htmlToText(html){
  if(!html) return '';
  html=html.replace(/<head\b[^>]*>[\s\S]*?<\/head>/gi,' ');
  html=html.replace(/<script\b[^>]*>[\s\S]*?<\/script>/gi,' ');
  html=html.replace(/<style\b[^>]*>[\s\S]*?<\/style>/gi,' ');
  html=html.replace(/<(br|\/p|\/div|\/h[1-6]|\/li|\/tr|\/blockquote)\b[^>]*>/gi,'\n');
  html=html.replace(/<(p|div|h[1-6]|li|blockquote)\b[^>]*>/gi,'\n');
  html=html.replace(/<[^>]+>/g,'');
  html=decodeEntities(html).replace(/\r\n?/g,'\n');
  html=html.replace(/[ \t\u00A0]+\n/g,'\n').replace(/\n{3,}/g,'\n\n');
  return html.trim();
}
async function loadEpub(buf){
  const zip=readZip(buf);
  const dec=u8=>decodeBytes(u8);
  let opfPath=null;
  const cont=await zipData(zip, zipGet(zip,'META-INF/container.xml'));
  if(cont){ const m=dec(cont).match(/full-path\s*=\s*"([^"]+)"/i); if(m) opfPath=m[1]; }
  const order=[]; let base='';
  if(opfPath){
    const ob=await zipData(zip, zipGet(zip,opfPath));
    if(ob){
      base=dirOf(opfPath); const opf=dec(ob); const map={};
      for(const it of opf.matchAll(/<item\b[^>]*>/gi)){ const id=attr(it[0],'id'),href=attr(it[0],'href'); if(id&&href) map[id]=href; }
      for(const sp of opf.matchAll(/<itemref\b[^>]*>/gi)){ const r=attr(sp[0],'idref'); if(r&&map[r]) order.push(map[r]); }
      if(order.length===0) for(const k in map) if(isDoc(map[k])) order.push(map[k]);
    }
  }
  const out=[];
  if(order.length){
    for(const href of order){
      const full=resolvePath(base, stripFrag(decodeURIComponent(href)));
      const b=await zipData(zip, zipGet(zip,full));
      if(b) out.push(htmlToText(dec(b)));
    }
  }else{
    const names=[...zip.map.keys()].filter(isDoc).sort();
    for(const nm of names){ const b=await zipData(zip, zipGet(zip,nm)); if(b) out.push(htmlToText(dec(b))); }
  }
  const txt=out.join('\n\n').trim();
  return txt||'(이 EPUB에서 읽을 수 있는 본문을 찾지 못했습니다.)';
}

async function openFile(file){
  try{
    toast('여는 중…');
    const buf=await file.arrayBuffer();
    const lower=file.name.toLowerCase();
    let text;
    if(lower.endsWith('.epub')) text=await loadEpub(buf);
    else text=decodeBytes(new Uint8Array(buf));
    setDocument(text, file.name);
  }catch(e){
    toast(/no-ds/.test(e.message)?'EPUB은 iOS 16.4 이상에서 열립니다':'파일을 열 수 없습니다');
  }
}
function setDocument(text, name){
  S.text=text.replace(/\r\n?/g,'\n'); S.name=name;
  render();
  $('empty').classList.add('hide');
  const rec=S.recents.find(r=>r.name===name);
  requestAnimationFrame(()=>{ setFraction(rec?rec.frac:0); updatePos(); });
  pushRecent(name);
}
function render(){
  const parts=S.text.split('\n'); let html='',open=false,buf='';
  const flush=()=>{ if(open){html+='<p>'+buf+'</p>';buf='';open=false;} };
  for(const raw of parts){
    const line=raw.replace(/\s+$/,'');
    if(line===''){ flush(); html+='<p class="blank"></p>'; continue; }
    if(open) buf+='<br>'+esc(line); else {buf=esc(line);open=true;}
  }
  flush();
  doc.innerHTML=html||'<p></p>';
}

function fraction(){ const m=reader.scrollHeight-reader.clientHeight; return m>0?reader.scrollTop/m:0; }
function setFraction(f){ const m=reader.scrollHeight-reader.clientHeight; reader.scrollTop=clamp(f,0,1)*Math.max(0,m); }
function updatePos(){
  const f=fraction(); const pct=Math.round(f*100);
  $('pos').textContent=pct+'%';
  $('scrub').value=Math.round(f*1000);
  if(S.name) saveRecentPos(f);
}
let posT=0;
reader.addEventListener('scroll',()=>{ clearTimeout(posT); posT=setTimeout(updatePos,60); },{passive:true});

function applySettings(){
  const s=S.settings, r=document.documentElement.style, t=THEMES[s.theme]||THEMES.paper;
  r.setProperty('--surface',t.bg); r.setProperty('--ink',t.ink);
  r.setProperty('--read',s.font); r.setProperty('--fs',s.fs+'px');
  r.setProperty('--lh',s.lh); r.setProperty('--pad',s.pad+'px');
  const mt=document.querySelector('meta[name=theme-color]'); if(mt) mt.setAttribute('content',t.bg);
  LS.set('tv:settings',s);
}
function changeSetting(k,d){
  const f=fraction();
  if(k==='fs') S.settings.fs=clamp(S.settings.fs+d,12,44);
  if(k==='lh') S.settings.lh=clamp(Math.round((S.settings.lh+d*0.05)*100)/100,1.2,3);
  if(k==='pad') S.settings.pad=clamp(S.settings.pad+d*4,8,72);
  $('fsN').textContent=S.settings.fs;
  $('lhN').textContent=S.settings.lh.toFixed(2);
  $('padN').textContent=S.settings.pad;
  applySettings();
  requestAnimationFrame(()=>{ setFraction(f); updatePos(); });
}

function pushRecent(name){
  S.recents=[{name,frac:0,at:Date.now()},...S.recents.filter(r=>r.name!==name)].slice(0,10);
  LS.set('tv:recents',S.recents); renderRecents();
}
let saveT=0;
function saveRecentPos(f){
  const r=S.recents.find(x=>x.name===S.name); if(r) r.frac=f;
  clearTimeout(saveT); saveT=setTimeout(()=>LS.set('tv:recents',S.recents),400);
}
function renderRecents(){
  const box=$('recent');
  if(!S.recents.length){ box.innerHTML='<div style="color:var(--chrome-mute);font-size:13px">최근 연 문서가 여기에 표시됩니다.</div>'; return; }
  box.innerHTML='';
  for(const r of S.recents){
    const b=document.createElement('button');
    b.innerHTML=esc(r.name)+'  <span class="pct">'+Math.round((r.frac||0)*100)+'%</span>';
    b.onclick=()=>{ closeSheet(); if(r.name===S.name){ setFraction(r.frac||0); updatePos(); } else { toast('“'+r.name+'”을(를) 다시 열면 이어서 읽습니다'); } };
    box.appendChild(b);
  }
}

function buildThemes(){
  const wrap=$('themes'); wrap.innerHTML='';
  for(const k in THEMES){
    const t=THEMES[k]; const el=document.createElement('button');
    el.className='theme'+(S.settings.theme===k?' sel':'');
    el.style.background=t.bg; el.style.color=t.ink; el.textContent=t.n;
    el.onclick=()=>{ S.settings.theme=k; buildThemes(); applySettings(); };
    wrap.appendChild(el);
  }
}

function openSheet(){ $('sheet').classList.add('open'); $('scrim').classList.add('open'); }
function closeSheet(){ $('sheet').classList.remove('open'); $('scrim').classList.remove('open'); }
let toastT=0;
function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1800); }

let touchY=0,touchX=0,moved=false;
reader.addEventListener('touchstart',e=>{ if(e.touches[0]){touchY=e.touches[0].clientY;touchX=e.touches[0].clientX;moved=false;} },{passive:true});
reader.addEventListener('touchmove',e=>{ if(e.touches[0]&&(Math.abs(e.touches[0].clientY-touchY)>8||Math.abs(e.touches[0].clientX-touchX)>8)) moved=true; },{passive:true});
reader.addEventListener('touchend',e=>{
  if(moved||!S.text) return;
  const y=(e.changedTouches[0]||{}).clientY||0, h=window.innerHeight;
  if(y>h*0.18 && y<h*0.82) document.body.classList.toggle('immersive');
});

const SAMPLE=(()=>{const p=[
"창밖으로는 비가 내리고 있었다. 나는 오래된 책 한 권을 펼친 채, 빗소리가 유리창을 두드리는 리듬에 가만히 귀를 기울였다. 활자와 활자 사이의 여백이 오늘따라 유난히 넓게 느껴졌고, 그 사이로 나는 천천히 걸어 들어갔다.",
"읽는다는 것은 결국 시간을 접었다 펴는 일과 같다. 한 페이지를 넘길 때마다 어제와 오늘이 포개지고, 낯선 사람의 목소리가 내 안에서 다시 살아난다.",
"글자를 조금 키우자 문장은 한결 편안해졌다. 줄과 줄 사이에 숨을 불어넣듯 간격을 벌리니 눈은 더 이상 서두르지 않았다. 화면을 한 번 톡 누르면 위아래 막대가 사라지고, 오직 글만 남는다.",
"밤이 깊어질수록 배경은 어두워지고 글자는 은은하게 떠오른다. 눈이 부시지 않도록, 그러나 문장이 흐려지지 않도록.",

$('openBtn').onclick=$('openBtn2').onclick=()=>$('file').click();
